<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>F1 Fantasy Stats Clone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="simple-header">
      <div class="sub-nav">
        <div class="container sub-inner">
          <nav>
            <a href="#">Home</a>
            <a class="active" href="#">Statistics</a>
            <a href="#">Prizes</a>
            <a href="#">What's New</a>
            <a href="#">How to play</a>
            <a href="#">Game rules</a>
          </nav>
        </div>
      </div>
    </header>

    <main class="page-bg">
      <section id="overviewView">
        <section class="hero-stats container">
          <h1>FANTASY STATS</h1>
          <div id="headlineRows" class="headline-rows"></div>
        </section>

        <section class="container season-banner">
          <h2 id="seasonTitle">Season</h2>
          <div class="races">🏁 Races: <strong id="raceCount"></strong></div>
        </section>

        <section class="container stats-section">
          <div class="section-heading">
            <h3>Driver Statistics</h3>
            <a href="#" data-open-details="driver">All Stats ›</a>
          </div>
          <div id="driverCards" class="stat-card-grid"></div>
        </section>

        <section class="container stats-section">
          <div class="section-heading">
            <h3>Constructor Statistics</h3>
            <a href="#" data-open-details="constructor">All Stats ›</a>
          </div>
          <div id="constructorCards" class="stat-card-grid"></div>
        </section>
      </section>

      <section id="detailView" class="container detail-view hidden">
        <div class="detail-banner">
          <button id="backToOverview" class="back-btn" type="button">← Go back</button>
          <h2 id="detailSeason"></h2>
          <div class="type-toggle">
            <button id="driverTab" data-type="driver">Driver</button>
            <button id="constructorTab" data-type="constructor">Constructor</button>
          </div>
        </div>

        <div class="detail-layout">
          <aside>
            <h4>Game Stats</h4>
            <ul id="metricMenu" class="metric-menu"></ul>
          </aside>
          <section>
            <div class="table-head">
              <span>#</span>
              <span id="nameHead">Driver</span>
              <span>Team</span>
              <span>Current Cost</span>
              <span id="valueHead">Points</span>
            </div>
            <div id="detailRows" class="detail-rows"></div>
          </section>
        </div>
      </section>
    </main>

    <template id="summaryRowTemplate">
      <article class="summary-row">
        <div class="hex left"></div>
        <div class="row-metric">
          <span class="pill"></span>
          <div class="score-panel">
            <div>
              <strong class="left-value"></strong>
              <p class="left-label"></p>
            </div>
            <div class="divider"></div>
            <div>
              <strong class="right-value"></strong>
              <p class="right-label"></p>
            </div>
          </div>
        </div>
        <div class="hex right"></div>
      </article>
    </template>

    <template id="statCardTemplate">
      <article class="stat-card">
        <header></header>
        <ol></ol>
        <button class="full-ranking">Full ranking</button>
      </article>
    </template>

    <script src="script.js" type="module"></script>
  </body>
</html>
